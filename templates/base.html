<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Groven{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">Groven</a>
            <div class="nav-links">
                {% for s in spaces_nav or [] %}
                <a href="/space/{{ s.id }}" class="nav-link">{{ s.title|truncate(30) }}</a>
                {% endfor %}
            </div>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='main.js') }}?v=3"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
