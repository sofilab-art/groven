services:
  - type: web
    name: groven
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: "3.12"
